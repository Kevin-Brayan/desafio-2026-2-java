<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Dashboard</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="flex-grow-1 p-4">

        <h2 class="mb-4">
            Dashboard
        </h2>

        <h4>Solicitações:</h4>
        <br>
        <br>

        <div class="row g-4">

            <div class="row">

                <div
                        class="col-md-3"
                        th:each="item : ${status}">

                    <div class="card shadow-sm">

                        <div class="card-body">

                            <h6 th:text="${item.status}"></h6>

                            <h2 th:text="${item.quantidade}"></h2>

                        </div>

                    </div>

                </div>

            </div>


            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted">
                            Tempo Médio até emissão
                        </h6>
                        <h2 th:text="${media.mediaEmissaoHoras} + ' h'">0 h</h2>
                    </div>
                </div>
            </div>

        </div>

        <div class="row mt-5">

            <div class="col-lg-6">

                <div class="card shadow-sm">

                    <div class="card-header">
                        Solicitações por Status
                    </div>

                    <div class="card-body">

                        <table class="table">

                            <thead>

                            <tr>
                                <th>Status</th>
                                <th>Quantidade</th>
                            </tr>

                            </thead>

                            <tbody>

                            <tr th:each="item : ${status}">

                                <td th:text="${item.status}"></td>

                                <td th:text="${item.quantidade}"></td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

            <div class="col-lg-6">

                <div class="card shadow-sm">

                    <div class="card-header">
                        Documentos Mais Solicitados
                    </div>

                    <div class="card-body">

                        <ul class="list-group">

                            <li
                                    class="list-group-item d-flex justify-content-between"
                                    th:each="doc : ${documentos}">

                                <span th:text="${doc.documento}"></span>

                                <span class="badge bg-primary"
                                      th:text="${doc.quantidade}">
                                </span>

                            </li>

                        </ul>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

</body>
</html>
